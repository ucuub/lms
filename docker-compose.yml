version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lmsuser
      POSTGRES_PASSWORD: lmspassword
      POSTGRES_DB: lms
      POSTGRES_MULTIPLE_DATABASES: lms,keycloak,lms_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - lms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmsuser -d lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ──────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: lmsuser
      KC_DB_PASSWORD: lmspassword
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Network / proxy
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge                  # trust X-Forwarded-* dari Codespaces proxy
      # Features
      KC_FEATURES: token-exchange
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── LMS Backend (ASP.NET Core API) ───────────────────────────────────────────
  lms-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=lms;Username=lmsuser;Password=lmspassword"
      Keycloak__Authority: "http://keycloak:8080/realms/lms"
      Keycloak__ClientId: "lms-app"
      Keycloak__AllowedClientId: "dwi-mobile"
      Keycloak__RequireHttpsMetadata: "false"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - lms_network
    restart: unless-stopped
    volumes:
      - uploads_data:/app/wwwroot/uploads

  # ── LMS Frontend (Vue.js via Nginx) ──────────────────────────────────────────
  lms-frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "http://localhost:5000/api"
        VITE_KEYCLOAK_URL: "http://localhost:8080"
        VITE_KEYCLOAK_REALM: "lms"
        VITE_KEYCLOAK_CLIENT_ID: "lms-app"
    ports:
      - "80:80"
    depends_on:
      - lms-api
    networks:
      - lms_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  lms_network:
    driver: bridge
