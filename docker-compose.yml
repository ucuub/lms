version: '3.8'

services:
  # ── LMS App (.NET) ───────────────────────────────────────────────
  lms-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=lms;Username=keycloak;Password=password"
      Keycloak__Authority: "http://keycloak:8080/realms/lms"
      Keycloak__ClientId: "lms-app"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET:-change-me-in-production}"
    depends_on:
      - postgres
      - keycloak
    networks:
      - lms_network
    restart: unless-stopped

  # ── Keycloak ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - lms_network
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: "keycloak,lms"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    ports:
      - "5432:5432"
    networks:
      - lms_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lms_network:
    driver: bridge
